<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>正在播放 - 视频站</title>
  <style>
    :root { --primary: #009A44; }
    body { margin: 0; background: #f1f2f3; font-family: sans-serif; }
    header { height: 60px; background: #fff; display: flex; align-items: center; padding: 0 40px; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--primary); font-size: 22px; font-weight: bold; }
    .logo img { height: 40px; }
    .main { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .player-box { background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; display: block; }
    .v-info { margin-top: 20px; background: #fff; padding: 25px; border-radius: 10px; }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <img src="logo.png" alt="视频站">
    <span>视频站</span>
  </a>
</header>
<div class="main">
  <div class="player-box"><video id="player" controls autoplay></video></div>
  <div class="v-info">
    <h1 id="title" style="font-size:20px; margin:0;">正在加载...</h1>
    <p style="color:#999; font-size:14px; margin-top:10px;">提示：静态版暂不支持保存点赞和评论</p>
  </div>
</div>

<script>
  // --- 关键：必须与 index.html 的列表完全一致 ---
  const myVideos = [
      { name: "01 门捷列夫是怎样“炼”成的.mp4" },
      { name: "举起手来.mp4" }
  ];

  function init() {
    // 解析 URL 里的 ?id=X
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const video = myVideos[id];

    if (video) {
      document.title = video.name + " - 播放中";
      document.getElementById('title').innerText = video.name;
      // 指向 uploads 文件夹下的视频文件
      document.getElementById('player').src = `uploads/${encodeURIComponent(video.name)}`;
    } else {
      document.getElementById('title').innerText = '视频不存在';
    }
  }
  window.onload = init;
</script>
</body>
</html>
